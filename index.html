<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Cisco Exam Trainer (MCQ + MSQ + DROP · Estudio/Examen)</title>

  <!-- =========================
       // ESTÉTICA (CSS)
       // Aquí decides colores, tipografías, tamaños, layout, etc.
       // NO hay lógica de examen aquí, solo apariencia.
  ========================== -->
  <style>
    :root{
      --bg:#0b1020;
      --panel:#121a33;
      --text:#e8ecff;
      --muted:#aab3e6;
      --accent:#6ea8fe;
      --ok:#38d996;
      --bad:#ff5c77;
      --warn:#ffd166;
      --line:#253057;
      --radius:14px;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 30% -10%, rgba(110,168,254,.18), transparent 60%),
        radial-gradient(900px 450px at 90% 10%, rgba(56,217,150,.10), transparent 60%),
        var(--bg);
    }

    header{
      position:sticky; top:0; z-index:10;
      background: rgba(11,16,32,.92);
      border-bottom:1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .wrap{ max-width:1050px; margin:0 auto; padding:16px; }
    .row{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .spacer{ flex:1; }

    .card{
      background: rgba(18,26,51,.75);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .hd{
      padding:14px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .bd{ padding:14px; }

    button{
      border:1px solid var(--line);
      background: rgba(18,26,51,.9);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:700;
    }
    button:hover{ border-color: rgba(110,168,254,.55); }
    .accent{ border-color: rgba(110,168,254,.7); }
    .ghost{ background: transparent; box-shadow:none; }
    .danger{ border-color: rgba(255,92,119,.7); }

    .grid{ display:grid; gap:14px; margin-top:16px; grid-template-columns: 1fr; }
    @media(min-width:900px){ .grid{ grid-template-columns: 2fr 1fr; } }

    .tag{ font-family:var(--mono); font-size:11px; color:var(--muted); }
    .qtitle{ font-weight:900; margin:0 0 8px; font-size:18px; }
    .qtext{ white-space:pre-wrap; line-height:1.35; margin:0 0 12px; font-size:16px; }

    .opts{ display:grid; gap:10px; }
    .opt{
      display:flex; gap:10px; align-items:flex-start;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(15,22,48,.65);
      cursor:pointer;
    }
    .opt:hover{ border-color: rgba(110,168,254,.55); }
    .opt input{ margin-top:3px; }

    /* estilos de corrección */
    .opt.correct{ border-color: rgba(56,217,150,.85); background: rgba(56,217,150,.12); }
    .opt.wrong{ border-color: rgba(255,92,119,.85); background: rgba(255,92,119,.10); }
    .opt.warn{ border-color: rgba(255,209,102,.85); background: rgba(255,209,102,.10); }

    .note{ font-size:12px; color:var(--muted); line-height:1.35; margin-top:12px; }
    .okText{ color:var(--ok); font-weight:900; }
    .badText{ color:var(--bad); font-weight:900; }
    .warnText{ color:var(--warn); font-weight:900; }

    .bar{
      height:10px;
      border-radius:999px;
      overflow:hidden;
      border:1px solid var(--line);
      background: rgba(15,22,48,.95);
    }
    .bar > div{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, rgba(110,168,254,.95), rgba(56,217,150,.85));
    }

    .kpi{ display:flex; gap:10px; flex-wrap:wrap; }
    .kpi .box{
      min-width:120px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(15,22,48,.75);
    }
    .kpi .t{ font-size:11px; color:var(--muted); }
    .kpi .v{ font-size:18px; font-weight:900; margin-top:4px; }

    .toast{
      position:fixed; left:50%; transform:translateX(-50%);
      bottom:14px; opacity:0; pointer-events:none; transition:.2s;
      background: rgba(18,26,51,.92);
      border:1px solid var(--line);
      padding:10px 12px;
      border-radius:999px;
      box-shadow: var(--shadow);
      font-size:13px;
    }
    .toast.show{ opacity:1; }

    /* // Imagen de pregunta (si existe q.img) */
    .qmedia{
      margin: 10px 0 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: rgba(15,22,48,.55);
    }
    .qmedia img{
      display:block;
      width: 100%;
      height: auto;
    }
    .qmedia .cap{
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }

    /* // DROP (ordenar) */
    .dragList{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:10px;
    }
    .dragItem{
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(15,22,48,.65);
      cursor:grab;
      user-select:none;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .dragItem:active{ cursor:grabbing; }
    .dragItem.dragging{ opacity:.45; }

    .dragItem.correct{ border-color: rgba(56,217,150,.85); background: rgba(56,217,150,.12); }
    .dragItem.wrong{ border-color: rgba(255,92,119,.85); background: rgba(255,92,119,.10); }

    .pill{
      font-family:var(--mono);
      font-size:11px;
      color:var(--muted);
      border:1px solid var(--line);
      padding:6px 10px;
      border-radius:999px;
      background: rgba(15,22,48,.45);
    }
  </style>
</head>

<body>
  <!-- =========================
       // MAQUETACIÓN (HTML)
       // Aquí está la “pantalla”:
       // - Cabecera con botones
       // - Zona pregunta
       // - Panel lateral con stats
  ========================== -->
  <header>
    <div class="wrap">
      <div class="row">
        <div>
          <div style="font-weight:900">Cisco Exam Trainer</div>
          <div class="tag">MCQ + MSQ + DROP · ID interno (no se muestra)</div>
        </div>

        <div class="spacer"></div>

        <div class="pill" id="pillMode">Modo: Examen</div>

        <button class="ghost" id="btnShuffle">Mezclar</button>
        <button class="ghost" id="btnReset">Reset</button>
        <button class="accent" id="btnFinish">Corregir</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="grid">
      <!-- Caja principal: Pregunta -->
      <section class="card">
        <div class="hd">
          <div style="flex:1">
            <div class="tag" id="qIndex">Pregunta 1 / 1</div>
            <div class="bar"><div id="progress"></div></div>
          </div>
          <div class="row">
            <button id="btnPrev">◀</button>
            <button id="btnNext">▶</button>
          </div>
        </div>
        <div class="bd" id="questionHost"></div>
      </section>

      <!-- Panel lateral -->
      <aside class="card">
        <div class="hd">
          <div style="font-weight:900">Panel</div>
          <div class="tag" id="dbInfo"></div>
        </div>
        <div class="bd">
          <div class="kpi">
            <div class="box"><div class="t">Respondidas</div><div class="v" id="kAnswered">0</div></div>
            <div class="box"><div class="t">Correctas</div><div class="v" id="kCorrect">0</div></div>
            <div class="box"><div class="t">Puntuación</div><div class="v" id="kScore">0%</div></div>
          </div>

          <div style="height:1px;background:var(--line);margin:14px 0"></div>

          <div class="row">
            <button class="ghost" id="btnMode">Cambiar a modo Estudio</button>
            <button class="danger" id="btnClear">Borrar progreso</button>
          </div>

          <div style="height:1px;background:var(--line);margin:14px 0"></div>

          <div class="note">
            En <b>Estudio</b> se ven las correctas siempre.<br/>
            En <b>Examen</b> no se ve nada hasta pulsar <b>Corregir</b>.<br/>
            (Y no: no se pinta verde/rojo antes de tiempo.)
          </div>
        </div>
      </aside>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <!-- =========================
       // LÓGICA (JS)
       // Aquí está todo el motor:
       // - Bancos por tipo
       // - Unión en QUESTIONS
       // - Estado (mode, idx, order, answers, finished)
       // - Render por tipo + corrección
       // - Eventos de botones
  ========================== -->
  <script>
    /* ============================================================
       CONFIG
       - AUTO_NEXT_EXAM: en examen avanza solo al responder (MCQ/MSQ)
       ============================================================ */
    const AUTO_NEXT_EXAM = true;

    /* =========================
       ZONA 1 — MCQ (1 correcta)
       Pega aquí TODAS tus MCQ
    ========================== */
    const BANK_MCQ = [
      {
        id:"mcq-001", // ID interno
        type:"mcq",
        q:"Why is it important to verify the update status after the initial upgrade process when upgrading firmware on a Cisco UCS C-Series server using the Host Upgrade Utility?",
        options:{
          A:"To generate a report for compliance documentation",
          B:"To confirm that all intended components were successfully updated",
          C:"To ensure compatibility with third-party applications",
          D:"To activate the new licenses associated with the firmware"
        },
        ok:"B",
        expl:"Verificar el estado confirma que los componentes previstos se actualizaron correctamente."
      },
      {
        id:"mcq-002",
        type:"mcq",
        img:"miguel.PNG",          // <-- tu archivo en el repo (ojo mayúsculas/minúsculas)
        caption:"Figura 1 — Ejemplo de imagen (cambia por la tuya).",
        q:"Based on the screenshot, which option indicates the server is in a healthy state?",
        options:{
          A:"Status: Critical",
          B:"Status: Warning",
          C:"Status: OK",
          D:"Status: Unknown"
        },
        ok:"C",
        expl:"En la interfaz, 'OK' indica estado saludable."
      },
    ];

    /* =========================
       ZONA 2 — MSQ (elige K)
       Pega aquí TODAS tus MSQ
    ========================== */
    const BANK_MSQ = [
      {
        id:"msq-001",
        type:"msq",
        q:"Which two characteristics describe VLANs? (Choose two.)",
        pick:2,
        options:{
          A:"They segment broadcast domains at Layer 2",
          B:"They operate at Layer 3",
          C:"They allow logical separation of networks",
          D:"They replace routing protocols",
          E:"They encrypt LAN traffic"
        },
        ok:["A","C"],
        expl:"Una VLAN segmenta dominios de broadcast y permite separación lógica a nivel L2."
      },
    ];

    /* =========================
       ZONA 3 — DROP (ordenar)
       Pega aquí TODAS tus DROP
       okOrder es el orden CORRECTO por índices, ej: [2,0,1,3]
    ========================== */
    const BANK_DROP = [
      {
        id:"drop-001",
        type:"drop",
        q:"Order the troubleshooting steps correctly.",
        items:[
          "Verify physical link",
          "Check IP configuration",
          "Ping default gateway",
          "Traceroute to destination"
        ],
        okOrder:[2,0,1,3], // <-- EJEMPLO: el orden correcto que tú quieres
        expl:"El orden correcto depende del procedimiento definido en el material."
      }
    ];

    /* =========================
       UNIÓN FINAL
       (esto NO lo tocas)
    ========================== */
    const QUESTIONS = [
      ...BANK_MCQ,
      ...BANK_MSQ,
      ...BANK_DROP
    ];

    /* =========================
       ESTADO (STATE)
       - mode: "exam" o "study"
       - idx: pregunta actual
       - order: orden actual (para mezclar)
       - answers: respuestas por id interno
       - finished: si se activó corrección (en examen)
    ========================== */
    const LS_KEY = "cisco_exam_runner_v3";
    let state = { mode:"exam", idx:0, order:[], answers:{}, finished:false };

    /* =========================
       UTILIDADES
    ========================== */
    const $ = sel => document.querySelector(sel);

    function toast(msg){
      const el = $("#toast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(()=>el.classList.remove("show"), 1400);
    }

    function clamp(n,min,max){
      return Math.max(min, Math.min(max,n));
    }

    function save(){
      localStorage.setItem(LS_KEY, JSON.stringify(state));
    }

    function load(){
      try{
        const raw = localStorage.getItem(LS_KEY);
        if(!raw) return false;
        const s = JSON.parse(raw);
        if(!s || !Array.isArray(s.order)) return false;
        state = s;
        return true;
      }catch(e){
        return false;
      }
    }

    // Regla:
    // - Estudio: siempre se ven correctas
    // - Examen: solo si finished=true (botón Corregir)
    function showCorrections(){
      return (state.mode === "study") || (state.finished === true);
    }

    /* =========================
       ORDEN DE PREGUNTAS
    ========================== */
    function initOrder(){
      state.order = QUESTIONS.map((_,i)=>i);
    }

    function shuffleOrder(){
      for(let i=state.order.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [state.order[i], state.order[j]] = [state.order[j], state.order[i]];
      }
      state.idx = 0;
    }

    function currentQ(){
      return QUESTIONS[state.order[state.idx]];
    }

    /* =========================
       ESTADÍSTICAS
    ========================== */
    function isAnswered(q, a){
      if(!a) return false;
      if(q.type === "mcq") return !!a.value;
      if(q.type === "msq") return Array.isArray(a.value) && a.value.length > 0;
      if(q.type === "drop") return Array.isArray(a.value) && a.value.length === (q.items?.length || 0);
      return !!a.value;
    }

    function computeStats(){
      const total = QUESTIONS.length;
      let answered = 0;
      let correct = 0;

      for(const q of QUESTIONS){
        const a = state.answers[q.id];
        if(isAnswered(q, a)) answered++;
        if(a && a.isCorrect) correct++;
      }

      const score = total ? Math.round((correct/total)*100) : 0;
      return { total, answered, correct, score };
    }

    function updatePanel(){
      const { total, answered, correct, score } = computeStats();

      $("#kAnswered").textContent = answered + " / " + total;
      $("#kCorrect").textContent = correct;
      $("#kScore").textContent = score + "%";
      $("#dbInfo").textContent = total + " preguntas";

      $("#qIndex").textContent = "Pregunta " + (state.idx+1) + " / " + total;
      $("#progress").style.width = Math.round(((state.idx+1)/total)*100) + "%";

      $("#pillMode").textContent = "Modo: " + (state.mode==="exam" ? "Examen" : "Estudio");
      $("#btnMode").textContent = state.mode==="exam" ? "Cambiar a modo Estudio" : "Cambiar a modo Examen";
      $("#btnFinish").textContent = state.finished ? "Ocultar corrección" : "Corregir";
    }

    /* =========================
       RENDER PRINCIPAL
       - NO muestra el ID interno
       - Solo muestra número de pregunta (2) etc.
    ========================== */
    function render(){
      const host = $("#questionHost");
      host.innerHTML = "";

      const q = currentQ();

      // Título solo número
      const title = document.createElement("div");
      title.className = "qtitle";
      title.textContent = (state.idx + 1) + ") " + (q.q || "");
      host.appendChild(title);

      // MEDIA (imagen opcional)
      if(q.img){
        const box = document.createElement("div");
        box.className = "qmedia";

        const img = document.createElement("img");
        img.src = q.img;
        img.alt = "Imagen de la pregunta";
        img.loading = "lazy";

        img.onerror = () => {
          // si no carga, avisamos y retiramos el bloque
          box.remove();
          toast("No se pudo cargar la imagen: " + q.img);
        };

        box.appendChild(img);

        if(q.caption){
          const cap = document.createElement("div");
          cap.className = "cap";
          cap.textContent = q.caption;
          box.appendChild(cap);
        }

        host.appendChild(box);
      }

      // Render por tipo
      if(q.type === "mcq") renderMCQ(host, q);
      if(q.type === "msq") renderMSQ(host, q);
      if(q.type === "drop") renderDROP(host, q);

      updatePanel();
      save();
    }

    /* =========================
       MCQ (1 correcta)
    ========================== */
    function renderMCQ(host, q){
      const opts = document.createElement("div");
      opts.className = "opts";

      const saved = state.answers[q.id]?.value || null;

      Object.entries(q.options).forEach(([key, val])=>{
        const label = document.createElement("label");
        label.className = "opt";

        const inp = document.createElement("input");
        inp.type = "radio";
        inp.name = "mcq_" + q.id;
        inp.value = key;
        if(saved === key) inp.checked = true;

        inp.addEventListener("change", ()=>{
          const value = inp.value;
          const isCorrect = (value === q.ok);
          state.answers[q.id] = { type:"mcq", value, isCorrect };

          updatePanel(); save();

          // solo colorea si toca
          if(showCorrections()){
            applyMCQStyles(opts, q);
            return;
          }

          // examen: auto-next
          if(AUTO_NEXT_EXAM && state.mode === "exam"){
            setTimeout(()=>go(1), 150);
          }
        });

        const txt = document.createElement("div");
        txt.innerHTML = "<b>"+key+".</b> " + val;

        label.appendChild(inp);
        label.appendChild(txt);
        opts.appendChild(label);
      });

      host.appendChild(opts);

      const meta = document.createElement("div");
      meta.className = "note";
      meta.id = "meta_" + q.id;
      host.appendChild(meta);

      if(showCorrections()){
        applyMCQStyles(opts, q);
      } else {
        meta.textContent = "Selecciona una opción.";
      }
    }

    function applyMCQStyles(opts, q){
      const meta = $("#meta_" + q.id);
      const picked = state.answers[q.id]?.value;

      [...opts.children].forEach(el=>{
        el.classList.remove("correct", "wrong");
        const input = el.querySelector("input");
        const k = input.value;

        // en estudio: se ve la correcta SIEMPRE
        if(k === q.ok) el.classList.add("correct");
        if(picked && k === picked && picked !== q.ok) el.classList.add("wrong");
      });

      if(!picked){
        meta.innerHTML = '<span class="warnText">Sin responder.</span> Correcta: <b>'+q.ok+'</b>';
        return;
      }

      const ok = picked === q.ok;
      meta.innerHTML = ok
        ? '<span class="okText">Correcto.</span>' + (q.expl ? " " + q.expl : "")
        : '<span class="badText">Incorrecto.</span> Correcta: <b>'+q.ok+'</b>' + (q.expl ? " · " + q.expl : "");
    }

    /* =========================
       MSQ (elige K)
    ========================== */
    function setEquals(aArr, bArr){
      const a = new Set(aArr);
      const b = new Set(bArr);
      if(a.size !== b.size) return false;
      for(const v of a){
        if(!b.has(v)) return false;
      }
      return true;
    }

    function renderMSQ(host, q){
      const pick = q.pick ?? 2;

      const guide = document.createElement("div");
      guide.className = "note";
      guide.innerHTML = "<b>Selecciona exactamente " + pick + " opción(es).</b>";
      guide.style.marginBottom = "10px";
      host.appendChild(guide);

      const opts = document.createElement("div");
      opts.className = "opts";

      const saved = state.answers[q.id]?.value || [];

      function selected(){
        const arr = [];
        opts.querySelectorAll("input[type=checkbox]").forEach(cb=>{
          if(cb.checked) arr.push(cb.value);
        });
        return arr;
      }

      function updateAnswer(){
        const chosen = selected();
        const isCorrect = (chosen.length === pick) && setEquals(chosen, q.ok);
        state.answers[q.id] = { type:"msq", value: chosen, isCorrect };

        updatePanel(); save();

        if(showCorrections()){
          applyMSQStyles(opts, q);
          return;
        }

        // examen: auto-next solo al completar pick
        if(AUTO_NEXT_EXAM && state.mode === "exam" && chosen.length === pick){
          setTimeout(()=>go(1), 150);
        }
      }

      Object.entries(q.options).forEach(([key, val])=>{
        const label = document.createElement("label");
        label.className = "opt";

        const inp = document.createElement("input");
        inp.type = "checkbox";
        inp.value = key;
        if(saved.includes(key)) inp.checked = true;

        inp.addEventListener("change", ()=>{
          const chosenNow = selected();
          if(chosenNow.length > pick){
            inp.checked = false;
            toast("Máximo " + pick);
            return;
          }
          updateAnswer();
        });

        const txt = document.createElement("div");
        txt.innerHTML = "<b>"+key+".</b> " + val;

        label.appendChild(inp);
        label.appendChild(txt);
        opts.appendChild(label);
      });

      host.appendChild(opts);

      const meta = document.createElement("div");
      meta.className = "note";
      meta.id = "meta_" + q.id;
      host.appendChild(meta);

      // estado inicial (sin colorear si no toca)
      state.answers[q.id] = {
        type:"msq",
        value: saved,
        isCorrect: (saved.length === pick) && setEquals(saved, q.ok)
      };
      save();

      if(showCorrections()){
        applyMSQStyles(opts, q);
      } else {
        meta.textContent = "Marca tus opciones.";
      }
    }

    function applyMSQStyles(opts, q){
      const meta = $("#meta_" + q.id);
      const pick = q.pick ?? 2;
      const chosen = state.answers[q.id]?.value || [];
      const okSet = new Set(q.ok);

      [...opts.children].forEach(el=>{
        el.classList.remove("correct","wrong","warn");
        const input = el.querySelector("input");
        const k = input.value;

        // en estudio: pinta correctas SIEMPRE
        if(okSet.has(k)) el.classList.add("correct");
        if(chosen.includes(k) && !okSet.has(k)) el.classList.add("wrong");
      });

      if(chosen.length !== pick){
        meta.innerHTML =
          '<span class="warnText">Incompleta.</span> Has seleccionado ' +
          chosen.length + '/' + pick + '. Correctas: <b>' + q.ok.join(", ") + '</b>';
        return;
      }

      const ok = setEquals(chosen, q.ok);
      meta.innerHTML = ok
        ? '<span class="okText">Correcto.</span>' + (q.expl ? " " + q.expl : "")
        : '<span class="badText">Incorrecto.</span> Correctas: <b>' + q.ok.join(", ") + '</b>' + (q.expl ? " · " + q.expl : "");
    }

    /* =========================
       DROP (ordenar)
       - arrastra para cambiar el orden
       - en Examen: no se corrige hasta "Corregir"
       - en Estudio: se corrige siempre
    ========================== */
    function renderDROP(host, q){
      const guide = document.createElement("div");
      guide.className = "note";
      guide.innerHTML = "<b>Arrastra para ordenar.</b>";
      guide.style.marginBottom = "10px";
      host.appendChild(guide);

      const list = document.createElement("div");
      list.className = "dragList";

      // order actual guardado o por defecto [0..n-1]
      const n = q.items.length;
      let currentOrder = state.answers[q.id]?.value
        ? [...state.answers[q.id].value]
        : Array.from({length:n}, (_,i)=>i);

      function createItem(idx){
        const div = document.createElement("div");
        div.className = "dragItem";
        div.draggable = true;
        div.dataset.index = String(idx);

        const badge = document.createElement("div");
        badge.className = "pill";
        badge.textContent = "↕";
        badge.style.flex = "0 0 auto";

        const txt = document.createElement("div");
        txt.textContent = q.items[idx];
        txt.style.flex = "1";

        div.appendChild(badge);
        div.appendChild(txt);

        div.addEventListener("dragstart", ()=>{
          div.classList.add("dragging");
        });

        div.addEventListener("dragend", ()=>{
          div.classList.remove("dragging");
          saveOrder();
        });

        return div;
      }

      function readOrderFromDOM(){
        return [...list.children].map(el=>Number(el.dataset.index));
      }

      function saveOrder(){
        const order = readOrderFromDOM();
        const isCorrect = JSON.stringify(order) === JSON.stringify(q.okOrder);
        state.answers[q.id] = { type:"drop", value: order, isCorrect };
        save(); updatePanel();

        if(showCorrections()){
          applyDropStyles(q, list);
        }
      }

      // pinta lista
      currentOrder.forEach(i=> list.appendChild(createItem(i)));

      // dragover (insertar según posición)
      list.addEventListener("dragover", (e)=>{
        e.preventDefault();
        const dragging = list.querySelector(".dragging");
        if(!dragging) return;

        const after = getDragAfterElement(list, e.clientY);
        if(after == null) list.appendChild(dragging);
        else list.insertBefore(dragging, after);
      });

      host.appendChild(list);

      const meta = document.createElement("div");
      meta.className = "note";
      meta.id = "meta_" + q.id;
      host.appendChild(meta);

      // asegura estado inicial guardado (sin corrección si no toca)
      const initialOrder = readOrderFromDOM();
      const initialCorrect = JSON.stringify(initialOrder) === JSON.stringify(q.okOrder);
      state.answers[q.id] = { type:"drop", value: initialOrder, isCorrect: initialCorrect };
      save();

      if(showCorrections()){
        applyDropStyles(q, list);
      } else {
        meta.textContent = "Ordena los elementos arrastrando.";
      }
    }

    function getDragAfterElement(container, y){
      const items = [...container.querySelectorAll(".dragItem:not(.dragging)")];
      let closest = { offset: Number.NEGATIVE_INFINITY, element: null };

      for(const child of items){
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height/2;
        if(offset < 0 && offset > closest.offset){
          closest = { offset, element: child };
        }
      }
      return closest.element;
    }

    function applyDropStyles(q, list){
      const meta = $("#meta_" + q.id);
      const order = [...list.children].map(el=>Number(el.dataset.index));
      const correct = JSON.stringify(order) === JSON.stringify(q.okOrder);

      [...list.children].forEach(el=>{
        el.classList.remove("correct","wrong");
        el.classList.add(correct ? "correct" : "wrong");
      });

      meta.innerHTML = correct
        ? '<span class="okText">Correcto.</span>' + (q.expl ? " " + q.expl : "")
        : '<span class="badText">Incorrecto.</span> Orden correcto: <b>' + q.okOrder.join(",") + '</b>' + (q.expl ? " · " + q.expl : "");
    }

    /* =========================
       NAVEGACIÓN
    ========================== */
    function go(delta){
      const total = QUESTIONS.length;
      state.idx = clamp(state.idx + delta, 0, total - 1);
      render();
    }

    /* =========================
       EVENTOS
    ========================== */
    $("#btnPrev").addEventListener("click", ()=>go(-1));
    $("#btnNext").addEventListener("click", ()=>go(1));

    $("#btnShuffle").addEventListener("click", ()=>{
      shuffleOrder();
      toast("Preguntas mezcladas");
      render();
    });

    $("#btnReset").addEventListener("click", ()=>{
      state.idx = 0;
      toast("Vuelta al inicio");
      render();
    });

    $("#btnMode").addEventListener("click", ()=>{
      state.mode = (state.mode === "exam") ? "study" : "exam";
      if(state.mode === "exam") state.finished = false; // al volver a examen, oculto
      toast("Modo cambiado");
      render();
    });

    $("#btnFinish").addEventListener("click", ()=>{
      state.finished = !state.finished;
      toast(state.finished ? "Corrección activada" : "Corrección ocultada");
      render();
    });

    $("#btnClear").addEventListener("click", ()=>{
      localStorage.removeItem(LS_KEY);
      state = { mode:"exam", idx:0, order:[], answers:{}, finished:false };
      initOrder();
      toast("Progreso borrado");
      render();
    });

    window.addEventListener("keydown", e=>{
      if(e.key==="ArrowLeft") go(-1);
      if(e.key==="ArrowRight") go(1);
    });

    /* =========================
       ARRANQUE (BOOT)
    ========================== */
    (function boot(){
      const ok = load();
      if(!ok) initOrder();
      else if(state.order.length !== QUESTIONS.length){
        initOrder();
        state.answers = {};
        state.idx = 0;
        state.finished = false;
      }
      render();
    })();
  </script>
</body>
</html>
