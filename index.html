<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Cisco Exam Trainer (MCQ + MSQ + DROP Orden)</title>

  <!-- =========================
       // ESTÉTICA (CSS)
       // Solo apariencia: colores, tamaños, layout.
       // No hay lógica aquí.
  ========================== -->
  <style>
    :root{
      --bg:#0b1020;
      --panel:#121a33;
      --text:#e8ecff;
      --muted:#aab3e6;
      --accent:#6ea8fe;
      --ok:#38d996;
      --bad:#ff5c77;
      --warn:#ffd166;
      --line:#253057;
      --radius:14px;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 30% -10%, rgba(110,168,254,.18), transparent 60%),
        radial-gradient(900px 450px at 90% 10%, rgba(56,217,150,.10), transparent 60%),
        var(--bg);
    }

    header{
      position:sticky; top:0; z-index:10;
      background: rgba(11,16,32,.92);
      border-bottom:1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .wrap{ max-width:1050px; margin:0 auto; padding:16px; }
    .row{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .spacer{ flex:1; }

    .card{
      background: rgba(18,26,51,.75);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .hd{
      padding:14px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .bd{ padding:14px; }

    button{
      border:1px solid var(--line);
      background: rgba(18,26,51,.9);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:700;
    }
    button:hover{ border-color: rgba(110,168,254,.55); }
    button:disabled{ opacity:.5; cursor:not-allowed; }

    .accent{ border-color: rgba(110,168,254,.7); }
    .ghost{ background: transparent; box-shadow:none; }
    .danger{ border-color: rgba(255,92,119,.7); }

    .grid{ display:grid; gap:14px; margin-top:16px; grid-template-columns: 1fr; }
    @media(min-width:900px){ .grid{ grid-template-columns: 2fr 1fr; } }

    .tag{ font-family:var(--mono); font-size:11px; color:var(--muted); }
    .qtitle{ font-weight:900; margin:0 0 8px; font-size:18px; }
    .qtext{ white-space:pre-wrap; line-height:1.35; margin:0 0 12px; font-size:16px; }

    .opts{ display:grid; gap:10px; }
    .opt{
      display:flex; gap:10px; align-items:flex-start;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(15,22,48,.65);
      cursor:pointer;
    }
    .opt:hover{ border-color: rgba(110,168,254,.55); }
    .opt input{ margin-top:3px; }

    /* Corrección */
    .opt.correct{ border-color: rgba(56,217,150,.85); background: rgba(56,217,150,.12); }
    .opt.wrong{ border-color: rgba(255,92,119,.85); background: rgba(255,92,119,.10); }
    .opt.warn{ border-color: rgba(255,209,102,.85); background: rgba(255,209,102,.10); }

    .note{ font-size:12px; color:var(--muted); line-height:1.35; margin-top:12px; }
    .okText{ color:var(--ok); font-weight:900; }
    .badText{ color:var(--bad); font-weight:900; }
    .warnText{ color:var(--warn); font-weight:900; }

    .bar{
      height:10px;
      border-radius:999px;
      overflow:hidden;
      border:1px solid var(--line);
      background: rgba(15,22,48,.95);
    }
    .bar > div{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, rgba(110,168,254,.95), rgba(56,217,150,.85));
    }

    .kpi{ display:flex; gap:10px; flex-wrap:wrap; }
    .kpi .box{
      min-width:120px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(15,22,48,.75);
    }
    .kpi .t{ font-size:11px; color:var(--muted); }
    .kpi .v{ font-size:18px; font-weight:900; margin-top:4px; }

    .toast{
      position:fixed; left:50%; transform:translateX(-50%);
      bottom:14px; opacity:0; pointer-events:none; transition:.2s;
      background: rgba(18,26,51,.92);
      border:1px solid var(--line);
      padding:10px 12px;
      border-radius:999px;
      box-shadow: var(--shadow);
      font-size:13px;
    }
    .toast.show{ opacity:1; }

    /* Media (imagen en pregunta) */
    .qmedia{
      margin: 10px 0 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: rgba(15,22,48,.55);
    }
    .qmedia img{ display:block; width:100%; height:auto; }
    .qmedia .cap{
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }

    /* DROP ordenar (sin drag: ↑ ↓) */
    .dropList{ display:grid; gap:10px; margin-top:10px; }
    .dropRow{
      display:grid;
      grid-template-columns: 42px 1fr 92px;
      gap:10px;
      align-items:center;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(15,22,48,.65);
    }
    .dropRow.correct{ border-color: rgba(56,217,150,.85); background: rgba(56,217,150,.10); }
    .dropRow.wrong{ border-color: rgba(255,92,119,.85); background: rgba(255,92,119,.10); }

    .dropNum{
      font-family: var(--mono);
      text-align:center;
      padding:8px 0;
      border-radius:10px;
      border:1px solid var(--line);
      background: rgba(18,26,51,.75);
      color: var(--muted);
    }
    .dropText{ line-height:1.25; }
    .dropBtns{ display:flex; gap:8px; justify-content:flex-end; }
    .mini{ padding:8px 10px; border-radius:10px; }
  </style>
</head>

            <b>Estudio:</b> se ve corrección siempre.<br/>
            <b>Sin explicaciones:</b> solo “Correcto/Incorrecto”.
          </div>
        </div>
      </aside>
    </div>
  </main>

          "Step D: Traceroute to destination"
        ],
        // ejemplo: el orden correcto es 2,0,1,3
        okOrder:[2,0,1,3]
      }
    ];

    /* =========================
       UNIÓN FINAL (NO TOCAR)
    ========================== */
    const QUESTIONS = [
      ...BANK_MCQ,
      ...BANK_MSQ,
      ...BANK_DROP
    ];

    /* ============================================================
       STATE (guardado local)
       ============================================================ */
    const LS_KEY = "cisco_exam_trainer_v3";
    let state = { mode:"exam", idx:0, order:[], answers:{}, finished:false };

    /* ============================================================
       UTILIDADES
       ============================================================ */
    const $ = sel => document.querySelector(sel);

    function toast(msg){
      const el = $("#toast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(()=>el.classList.remove("show"), 1400);
    }

    function clamp(n,min,max){ return Math.max(min, Math.min(max,n)); }

    function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

    function load(){
      try{
        const raw = localStorage.getItem(LS_KEY);
        if(!raw) return false;
        const s = JSON.parse(raw);
        if(!s || !Array.isArray(s.order)) return false;
        state = s;
        return true;
      }catch(e){ return false; }
    }

    // Regla: en estudio SIEMPRE se corrige; en examen SOLO si finished=true
    function showCorrections(){
      return (state.mode === "study") || (state.finished === true);
    }

    function setEquals(aArr, bArr){
      const a = new Set(aArr);
      const b = new Set(bArr);
      if(a.size !== b.size) return false;
      for(const v of a){ if(!b.has(v)) return false; }
      return true;
    }

    /* ============================================================
       ORDEN / MEZCLA
       ============================================================ */
    function initOrder(){ state.order = QUESTIONS.map((_,i)=>i); }

    function shuffleOrder(){
      for(let i=state.order.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [state.order[i], state.order[j]] = [state.order[j], state.order[i]];
      }
      state.idx = 0;
    }

    function currentQ(){ return QUESTIONS[state.order[state.idx]]; }

    /* ============================================================
       STATS
       ============================================================ */
    function isAnswered(q, a){
      if(!a) return false;
      if(q.type === "mcq") return !!a.value;
      if(q.type === "msq") return Array.isArray(a.value) && a.value.length > 0;
      if(q.type === "dropOrder") return Array.isArray(a.value) && a.value.length === q.items.length;
      return false;
    }

    function computeStats(){
      const total = QUESTIONS.length;
      let answered = 0, correct = 0;
      for(const q of QUESTIONS){
        const a = state.answers[q.id];
        if(isAnswered(q,a)) answered++;
        if(a && a.isCorrect) correct++;
      }
      const score = total ? Math.round((correct/total)*100) : 0;
      return { total, answered, correct, score };
    }

    function updatePanel(){
      const { total, answered, correct, score } = computeStats();

      $("#kAnswered").textContent = answered + " / " + total;
      $("#kCorrect").textContent = correct;
      $("#kScore").textContent = score + "%";
      $("#dbInfo").textContent = total + " preguntas";

      $("#qIndex").textContent = "Pregunta " + (state.idx+1) + " / " + total;
      $("#progress").style.width = total ? Math.round(((state.idx+1)/total)*100) + "%" : "0%";

      $("#pillMode").textContent = "Modo: " + (state.mode==="exam" ? "Examen" : "Estudio");
      $("#btnMode").textContent = state.mode==="exam" ? "Cambiar a modo Estudio" : "Cambiar a modo Examen";
      $("#btnFinish").textContent = state.finished ? "Ocultar corrección" : "Corregir";
    }

    /* ============================================================
       RENDER PRINCIPAL
       - No muestra id interno
       - Solo número + enunciado + (imagen opcional) + opciones
       ============================================================ */
    function render(){
      const host = $("#questionHost");
      host.innerHTML = "";

      const q = currentQ();

      // Título: solo número de pregunta
      const title = document.createElement("div");
      title.className = "qtitle";
      title.textContent = (state.idx + 1) + ")";
      host.appendChild(title);

      // Enunciado
      const text = document.createElement("div");
      text.className = "qtext";
      text.textContent = q.q;
      host.appendChild(text);

      // Imagen opcional
      if(q.img){
        const box = document.createElement("div");
        box.className = "qmedia";

        const img = document.createElement("img");
        img.src = q.img;
        img.alt = "Imagen de la pregunta";
        img.loading = "lazy";
        img.onerror = () => { box.remove(); }; // si no carga, fuera

        box.appendChild(img);

        if(q.caption){
          const cap = document.createElement("div");
          cap.className = "cap";
          cap.textContent = q.caption;
          box.appendChild(cap);
        }

        host.appendChild(box);
      }

      // Render por tipo
      if(q.type === "mcq") renderMCQ(host, q);
      if(q.type === "msq") renderMSQ(host, q);
      if(q.type === "dropOrder") renderDROP(host, q);

      updatePanel();
      save();
    }

    /* ============================================================
       MCQ (1 correcta)
       - En examen: no corrige hasta "Corregir"
       - En estudio: corrige siempre
       - Sin explicaciones, solo Correcto/Incorrecto
       ============================================================ */
    function renderMCQ(host, q){
      const opts = document.createElement("div");
      opts.className = "opts";

      const saved = state.answers[q.id]?.value || null;

      Object.entries(q.options).forEach(([key, val])=>{
        const label = document.createElement("label");
        label.className = "opt";

        const inp = document.createElement("input");
        inp.type = "radio";
        inp.name = "mcq_" + q.id;
        inp.value = key;
        if(saved === key) inp.checked = true;

        inp.addEventListener("change", ()=>{
          const value = inp.value;
          const isCorrect = (value === q.ok);
          state.answers[q.id] = { type:"mcq", value, isCorrect };

          updatePanel(); save();

          if(showCorrections()){
            applyMCQStyles(opts, q);
            return;
          }

          if(AUTO_NEXT_EXAM && state.mode === "exam"){
            setTimeout(()=>go(1), 150);
          }
        });

        const txt = document.createElement("div");
        txt.innerHTML = "<b>"+key+".</b> " + val;

        label.appendChild(inp);
        label.appendChild(txt);
        opts.appendChild(label);
      });

      host.appendChild(opts);

      const meta = document.createElement("div");
      meta.className = "note";
      meta.id = "meta_" + q.id;
      host.appendChild(meta);

      if(showCorrections()) applyMCQStyles(opts, q);
      else meta.textContent = "Selecciona una opción.";
    }

    function applyMCQStyles(opts, q){
      const meta = $("#meta_" + q.id);
      const picked = state.answers[q.id]?.value;

      [...opts.children].forEach(el=>{
        el.classList.remove("correct","wrong");
        const k = el.querySelector("input").value;

        if(!picked) return;
        if(k === q.ok) el.classList.add("correct");
        if(k === picked && picked !== q.ok) el.classList.add("wrong");
      });

      if(!picked){
        meta.innerHTML = '<span class="warnText">Sin responder.</span>';
        return;
      }

      meta.innerHTML = (picked === q.ok)
        ? '<span class="okText">Correcto.</span>'
        : '<span class="badText">Incorrecto.</span>';
    }

    /* ============================================================
       MSQ (elige K)
       - En examen: no corrige hasta "Corregir"
       - En estudio: corrige siempre
       - Sin explicaciones, solo Correcto/Incorrecto
       ============================================================ */
    function renderMSQ(host, q){
      const pick = q.pick ?? 2;

      const guide = document.createElement("div");
      guide.className = "note";
      guide.innerHTML = "<b>Selecciona exactamente " + pick + " opción(es).</b>";
      guide.style.marginBottom = "10px";
      host.appendChild(guide);

      const opts = document.createElement("div");
      opts.className = "opts";

      const saved = state.answers[q.id]?.value || [];

      function selected(){
        const arr = [];
        opts.querySelectorAll("input[type=checkbox]").forEach(cb=>{
          if(cb.checked) arr.push(cb.value);
        });
        return arr;
      }

      function updateAnswer(){
        const chosen = selected();
        const isCorrect = (chosen.length === pick) && setEquals(chosen, q.ok);
        state.answers[q.id] = { type:"msq", value: chosen, isCorrect };

        updatePanel(); save();

        if(showCorrections()){
          applyMSQStyles(opts, q);
          return;
        }

        if(AUTO_NEXT_EXAM && state.mode === "exam" && chosen.length === pick){
          setTimeout(()=>go(1), 150);
        }
      }

      Object.entries(q.options).forEach(([key, val])=>{
        const label = document.createElement("label");
        label.className = "opt";

        const inp = document.createElement("input");
        inp.type = "checkbox";
        inp.value = key;
        if(saved.includes(key)) inp.checked = true;

        inp.addEventListener("change", ()=>{
          const chosenNow = selected();
          if(chosenNow.length > pick){
            inp.checked = false;
            toast("Máximo " + pick);
            return;
          }
          updateAnswer();
        });

        const txt = document.createElement("div");
        txt.innerHTML = "<b>"+key+".</b> " + val;

        label.appendChild(inp);
        label.appendChild(txt);
        opts.appendChild(label);
      });

      host.appendChild(opts);

      const meta = document.createElement("div");
      meta.className = "note";
      meta.id = "meta_" + q.id;
      host.appendChild(meta);

      // estado inicial
      state.answers[q.id] = {
        type:"msq",
        value: saved,
        isCorrect: (saved.length === pick) && setEquals(saved, q.ok)
      };
      save();

      if(showCorrections()) applyMSQStyles(opts, q);
      else meta.textContent = "Marca tus opciones.";
    }

    function applyMSQStyles(opts, q){
      const meta = $("#meta_" + q.id);
      const pick = q.pick ?? 2;
      const chosen = state.answers[q.id]?.value || [];
      const okSet = new Set(q.ok);

      [...opts.children].forEach(el=>{
        el.classList.remove("correct","wrong","warn");
        const k = el.querySelector("input").value;
        if(okSet.has(k)) el.classList.add("correct");
        if(chosen.includes(k) && !okSet.has(k)) el.classList.add("wrong");
      });

      const ok = (chosen.length === pick) && setEquals(chosen, q.ok);

      meta.innerHTML = ok
        ? '<span class="okText">Correcto.</span>'
        : '<span class="badText">Incorrecto.</span>';
    }

    /* ============================================================
       DROP (orden exacto) SIN DRAG: ↑ ↓
       - En examen: solo muestra Correcto/Incorrecto al pulsar "Corregir"
       - En estudio: corrige siempre
       - No muestra el orden correcto NUNCA
       ============================================================ */
    function renderDROP(host, q){
      const guide = document.createElement("div");
      guide.className = "note";
      guide.innerHTML = "<b>Ordena con ↑ ↓.</b>";
      host.appendChild(guide);

      const list = document.createElement("div");
      list.className = "dropList";
      host.appendChild(list);

      const meta = document.createElement("div");
      meta.className = "note";
      meta.id = "meta_" + q.id;
      host.appendChild(meta);

      const n = q.items.length;

      // Orden guardado (array de índices) o un orden inicial (0..n-1)
      let order = state.answers[q.id]?.value
        ? [...state.answers[q.id].value]
        : Array.from({length:n}, (_,i)=>i);

      function isCorrectOrder(ord){
        return JSON.stringify(ord) === JSON.stringify(q.okOrder);
      }

      function persist(){
        const isCorrect = isCorrectOrder(order);
        state.answers[q.id] = { type:"dropOrder", value:[...order], isCorrect };
        save(); updatePanel();
      }

      function swap(i,j){
        const tmp = order[i];
        order[i] = order[j];
        order[j] = tmp;
      }

      function paint(){
        list.innerHTML = "";

        order.forEach((itemIndex, pos)=>{
          const row = document.createElement("div");
          row.className = "dropRow";

          const num = document.createElement("div");
          num.className = "dropNum";
          num.textContent = (pos+1);

          const txt = document.createElement("div");
          txt.className = "dropText";
          txt.textContent = q.items[itemIndex];

          const btns = document.createElement("div");
          btns.className = "dropBtns";

          const up = document.createElement("button");
          up.className = "mini ghost";
          up.textContent = "↑";
          up.disabled = (pos === 0);
          up.addEventListener("click", ()=>{
            swap(pos, pos-1);
            persist();
            paint();

            if(AUTO_NEXT_EXAM && state.mode==="exam" && !showCorrections()){
              // no auto-next aquí; tú decides cuando pasar
            }
          });

          const down = document.createElement("button");
          down.className = "mini ghost";
          down.textContent = "↓";
          down.disabled = (pos === order.length-1);
          down.addEventListener("click", ()=>{
            swap(pos, pos+1);
            persist();
            paint();
          });

          btns.appendChild(up);
          btns.appendChild(down);

          row.appendChild(num);
          row.appendChild(txt);
          row.appendChild(btns);

          list.appendChild(row);
        });

        // Corrección: SOLO Correcto / Incorrecto
        if(showCorrections()){
          const ok = isCorrectOrder(order);

          [...list.children].forEach(r=>{
            r.classList.remove("correct","wrong");
            r.classList.add(ok ? "correct" : "wrong");
          });

          $("#meta_" + q.id).innerHTML = ok
            ? '<span class="okText">Correcto.</span>'
            : '<span class="badText">Incorrecto.</span>';
        } else {
          $("#meta_" + q.id).textContent = "Ajusta el orden y pasa a la siguiente.";
        }
      }

      persist();
      paint();
    }

    /* ============================================================
       NAVEGACIÓN
       ============================================================ */
    function go(delta){
      const total = QUESTIONS.length;
      state.idx = clamp(state.idx + delta, 0, total - 1);
      render();
    }

    /* ============================================================
       EVENTOS UI
       ============================================================ */
    $("#btnPrev").addEventListener("click", ()=>go(-1));
    $("#btnNext").addEventListener("click", ()=>go(1));

    $("#btnShuffle").addEventListener("click", ()=>{
      shuffleOrder();
      toast("Preguntas mezcladas");
      render();
    });

    $("#btnReset").addEventListener("click", ()=>{
      state.idx = 0;
      toast("Vuelta al inicio");
      render();
    });

    $("#btnMode").addEventListener("click", ()=>{
      state.mode = (state.mode === "exam") ? "study" : "exam";
      if(state.mode === "exam") state.finished = false; // al volver a examen, ocultamos corrección
      toast("Modo cambiado");
      render();
    });

    $("#btnFinish").addEventListener("click", ()=>{
      state.finished = !state.finished;
      toast(state.finished ? "Corrección activada" : "Corrección ocultada");
      render();
    });

    $("#btnClear").addEventListener("click", ()=>{
      localStorage.removeItem(LS_KEY);
      state = { mode:"exam", idx:0, order:[], answers:{}, finished:false };
      initOrder();
      toast("Progreso borrado");
      render();
    });

    window.addEventListener("keydown", e=>{
      if(e.key==="ArrowLeft") go(-1);
      if(e.key==="ArrowRight") go(1);
    });

    /* ============================================================
       BOOT
       ============================================================ */
    (function boot(){
      const ok = load();
      if(!ok) initOrder();
      else if(state.order.length !== QUESTIONS.length){
        initOrder();
        state.answers = {};
        state.idx = 0;
        state.finished = false;
      }
      render();
    })();
  </script>
</body>
</html>
